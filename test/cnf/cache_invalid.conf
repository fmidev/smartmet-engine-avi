#
# aviengine test config: cache enabled but durationhours <= recordsetstarttimeoffsethours
# (must be rejected at construction)
#

postgis:
{
	host		= "smartmet-test";
	port		= 5444;
	database	= "avi";
	username	= "avi_user";
	password	= "avi_pw";
	encoding	= "UTF8";
};

message:
{
	maxstations	 = 0;
	maxrows		 = 0;

	recordsetstarttimeoffsethours = 30;
	recordsetendtimeoffsethours = 12;

	cache:
	{
		enabled       = true;
		durationhours = 20;	# invalid: not greater than recordsetstarttimeoffsethours (30)
	};

	types =
	(
		{
			name = "METAR";
			timerangetype = "messagetime";
			validityhours = 2;
			latestmessage = true;
		}
	);
}
