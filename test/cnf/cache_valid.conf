#
# aviengine test config: in-memory cache enabled with valid settings
#

postgis:
{
	host		= "smartmet-test";
	port		= 5444;
	database	= "avi";
	username	= "avi_user";
	password	= "avi_pw";
	encoding	= "UTF8";
};

message:
{
	maxstations	 = 0;
	maxrows		 = 0;

	recordsetstarttimeoffsethours = 30;
	recordsetendtimeoffsethours = 12;

	cache:
	{
		enabled           = true;
		durationhours     = 48;
		updateintervalsec = 15;
		safetymarginsec   = 300;
		shadowcompare     = true;
		memorylimitmb     = 512;
	};

	types =
	(
		{
			name = "METAR";
			timerangetype = "messagetime";
			validityhours = 2;
			latestmessage = true;
		}
	);
}
